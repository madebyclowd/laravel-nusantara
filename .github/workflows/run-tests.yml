name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [10.*, 11.*, 12.*, 13.*]
        stability: [prefer-stable]
        exclude:
          - php: 8.2
            laravel: 12.*
          - php: 8.2
            laravel: 13.*
        include:
          - php: 8.2
            laravel: 10.*
            testbench: 8.*
          - php: 8.2
            laravel: 11.*
            testbench: 9.*
          - php: 8.3
            laravel: 10.*
            testbench: 8.*
          - php: 8.3
            laravel: 11.*
            testbench: 9.*
          - php: 8.3
            laravel: 12.*
            testbench: 10.*
          - php: 8.3
            laravel: 13.*
            testbench: 11.*
          - php: 8.4
            laravel: 10.*
            testbench: 8.*
          - php: 8.4
            laravel: 11.*
            testbench: 9.*
          - php: 8.4
            laravel: 12.*
            testbench: 10.*
          - php: 8.4
            laravel: 13.*
            testbench: 11.*

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, gd, exif, iconv
          coverage: none

      - name: Setup Problem Matchers
        run: echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/phpunit
